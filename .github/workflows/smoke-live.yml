name: smoke-live

# Manual, credentialed pre-demo check that the LIVE Vultr path works on SYNTHETIC data only.
# Not run on PRs — CI stays deterministic in replay mode.
on:
  workflow_dispatch:

jobs:
  smoke-live:
    name: live Vultr smoke (synthetic only)
    runs-on: ubuntu-latest
    environment: demo   # gate secrets behind an environment
    env:
      CS_INFERENCE_MODE: live
      VULTR_INFERENCE_API_KEY: ${{ secrets.VULTR_INFERENCE_API_KEY }}
      VULTR_INFERENCE_BASE_URL: ${{ secrets.VULTR_INFERENCE_BASE_URL }}
      CS_LLM_MODEL: ${{ secrets.CS_LLM_MODEL }}                 # Kimi K2 Instruct (confirm id via /v1/models)
      CS_RETRIEVER_MODEL: vultr/VultronRetrieverPrime-Qwen3.5-8B
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install
        run: pip install uv && (cd apps/api && uv sync || pip install -e '.[dev]')
      - name: Live smoke (synthetic corpus only)
        run: |
          if [ -f scripts/smoke_live.py ]; then python scripts/smoke_live.py; \
          else echo "scripts/smoke_live.py not present yet"; fi
