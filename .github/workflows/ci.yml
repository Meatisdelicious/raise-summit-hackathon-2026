name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Tests run in REPLAY mode and never call Vultr. Live Vultr is checked by smoke-live.yml.
env:
  CS_INFERENCE_MODE: replay

jobs:
  privacy:
    name: privacy (required)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Privacy scan (no real hormone data / identifiers / PDFs)
        run: python scripts/privacy_scan.py
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env: { GITLEAKS_CONFIG: .gitleaks.toml }

  backend:
    name: backend (lint/type/test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Skip if backend not scaffolded yet
        id: guard
        run: |
          if [ -f apps/api/pyproject.toml ]; then echo "go=true" >> "$GITHUB_OUTPUT"; else echo "go=false" >> "$GITHUB_OUTPUT"; echo "apps/api not present yet — skipping"; fi
      - name: Install
        if: steps.guard.outputs.go == 'true'
        run: pip install uv && (cd apps/api && uv sync || pip install -e '.[dev]')
      - name: Lint + typecheck + test
        if: steps.guard.outputs.go == 'true'
        run: make lint typecheck test

  web:
    name: web (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Skip if web not scaffolded yet
        id: guard
        run: |
          if [ -f apps/web/package.json ]; then echo "go=true" >> "$GITHUB_OUTPUT"; else echo "go=false" >> "$GITHUB_OUTPUT"; echo "apps/web not present yet — skipping"; fi
      - name: Install + build
        if: steps.guard.outputs.go == 'true'
        run: cd apps/web && npm ci && npm run build
